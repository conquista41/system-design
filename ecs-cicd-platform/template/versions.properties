# ──────────────────────────────────────────────────────────────────
# versions.properties
# Source of truth for service image versions.
#
# Read by:
#   scripts/build-docker-images.sh   → builds <project>/<service>:<env>.<version>
#   scripts/push-images.sh           → tags + pushes the same to ECR
#   Jenkinsfile                      → exports each as TF_VAR_<SERVICE>_VERSION
#
# Format (one per line, no spaces around '='):
#   SERVICE_KEY=MAJOR.MINOR.PATCH
#
# Rules:
#   - Keys MUST match the SERVICES array in the build/push scripts
#     and the YOUR_SERVICE_*_VERSION variables in terraform/cluster-vars.tf.
#   - Use plain semver here (e.g. 1.4.2). The pipeline prepends the
#     environment, producing the final image tag: dev.1.4.2 / prod.1.4.2.
#   - Bump the relevant line to release a new version of that service.
# ──────────────────────────────────────────────────────────────────

YOUR_SERVICE_1=1.0.0
YOUR_SERVICE_2=1.0.0
YOUR_SERVICE_3=1.0.0
YOUR_SERVICE_4=1.0.0
